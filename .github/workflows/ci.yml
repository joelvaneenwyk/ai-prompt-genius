name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: go-task/setup-task@v1
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: npm install
      - run: npm run build

  run-task:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: go-task/setup-task@v1
      - uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh -s -- -b $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: task
